<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="Yw904lqi6vL90fRBI-L0vJ1mMJvINEKWVbMP23n-sMo" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EmpowerHer</title>
    <!-- Google Sign-In Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* --- COPYING YOUR EXISTING THEME --- */
        :root {
            --primary: #2A9D8F; /* Calming Teal */
            --primary-dark: #1f7a6f;
            --secondary: #E76F51; /* Warm Terracotta */
            --accent: #E9C46A; /* Soft Gold */
            --bg: #FDFCF5; /* Cream White */
            --text: #264653; /* Dark Charcoal */
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- LOGIN CONTAINER --- */
        .container {
            background: var(--white);
            width: 100%;
            max-width: 900px;
            min-height: 600px;
            display: flex;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        /* --- LEFT SIDE (IMAGE/BRANDING) --- */
        .brand-section {
            flex: 1;
            background: linear-gradient(135deg, var(--primary) 0%, #218c7e 100%);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem;
            position: relative;
        }

        .brand-section::after {
            /* Decorative Circle */
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .brand-section h1 { font-size: 2.5rem; margin-bottom: 1rem; line-height: 1.2; }
        .brand-section p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem; }
        
        .testimonial {
            background: rgba(255,255,255,0.1);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            font-style: italic;
            margin-top: auto;
        }

        /* --- RIGHT SIDE (FORM) --- */
        .form-section {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-text {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            display: inline-block;
            text-decoration: none;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding-bottom: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: var(--text);
            border-bottom: 3px solid var(--secondary);
        }

        /* --- INPUTS --- */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 600; }
        
        .input-wrapper { position: relative; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        /* --- BUTTONS --- */
        .btn-submit {
            width: 100%;
            background: var(--secondary);
            color: var(--white);
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: #d65d3f;
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .google-btn {
            width: 100%;
            background: var(--white);
            border: 2px solid #eee;
            padding: 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 1rem;
            color: #555;
            font-weight: 600;
            transition: 0.3s;
        }
        
        .google-btn:hover { border-color: #ddd; background: #fafafa; }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #999;
            font-size: 0.9rem;
            position: relative;
        }
        
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #eee;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* --- ERROR / SUCCESS MESSAGES --- */
        .message {
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
        .message.error {
            background: #ffe3e3;
            color: #d63031;
            border: 1px solid #ffcccc;
            display: block;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        /* --- TOGGLE LOGIC --- */
        .signup-field { display: none; }
        
        /* Google Sign-In container */
        #google-signin-container {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container { flex-direction: column; min-height: auto; }
            .brand-section { padding: 2rem; display: none; /* Hide branding on small mobile to save space */ }
            .form-section { padding: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-section">
        <h1>Start your journey to<br>Financial Freedom.</h1>
        <p>Join 10,000+ housewives earning safely from home.</p>
        
        <div class="testimonial">
            "The platform is so easy to use. I created my profile in 2 minutes!"
            <br><br>
            <small>— Meera K, Joined 2 days ago</small>
        </div>
    </div>

    <div class="form-section">
        <a href="dashboard.html" class="logo-text">EmpowerHer</a>

        <div id="form-message" class="message"></div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')" id="tab-login">Login</div>
            <div class="tab" onclick="switchTab('signup')" id="tab-signup">Sign Up</div>
        </div>

        <form id="auth-form" onsubmit="event.preventDefault(); handleSubmit();">
            
            <div class="form-group signup-field">
                <label>Full Name</label>
                <input type="text" id="input-name" placeholder="e.g. Anita Sharma">
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <div class="input-wrapper">
                    <input type="tel" id="input-mobile" placeholder="98765 43210" pattern="[0-9]{10}" required>
                </div>
            </div>

            <div class="form-group">
                <label id="pass-label">Password</label>
                <input type="password" id="input-password" placeholder="Enter your password" required />

                <div style="text-align: right; margin-top: 5px;">
                    <a href="#" style="font-size: 0.8rem; color: var(--primary);">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Login Securely</button>

            <div class="divider">OR</div>

            <!-- Google Sign-In Button -->
            <div id="google-signin-container">
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="outline"
                     data-text="continue_with"
                     data-size="large"
                     data-width="320">
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    // --- API Base URL ---
    const API_BASE = window.location.origin;

    // --- Check if already logged in ---
    const existingToken = localStorage.getItem('empowerher_token');
    if (existingToken) {
        window.location.href = 'dashboard.html';
    }

    // --- DOM Elements ---
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const signupFields = document.querySelectorAll('.signup-field');
    const submitBtn = document.getElementById('submit-btn');
    const passLabel = document.getElementById('pass-label');
    const formMessage = document.getElementById('form-message');

    let currentMode = 'login';

    function switchTab(mode) {
        currentMode = mode;
        hideMessage();

        if (mode === 'signup') {
            tabLogin.classList.remove('active');
            tabSignup.classList.add('active');
            signupFields.forEach(field => field.style.display = 'block');
            passLabel.innerText = "Create Password";
            submitBtn.innerText = "Create Account";
        } else {
            tabSignup.classList.remove('active');
            tabLogin.classList.add('active');
            signupFields.forEach(field => field.style.display = 'none');
            passLabel.innerText = "Password";
            submitBtn.innerText = "Login Securely";
        }
    }

    function showMessage(text, type) {
        formMessage.textContent = text;
        formMessage.className = 'message ' + type;
    }

    function hideMessage() {
        formMessage.className = 'message';
        formMessage.textContent = '';
    }

    async function handleSubmit() {
        const mobile = document.getElementById('input-mobile').value.replace(/\s/g, '');
        const password = document.getElementById('input-password').value;

        hideMessage();
        submitBtn.disabled = true;
        const originalText = submitBtn.innerText;
        submitBtn.innerText = "Processing...";

        try {
            if (currentMode === 'signup') {
                // --- REGISTER ---
                const fullName = document.getElementById('input-name').value.trim();
                if (!fullName) {
                    showMessage('Please enter your full name.', 'error');
                    return;
                }

                const res = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, mobile, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showMessage(data.error, 'error');
                    return;
                }

                localStorage.setItem('empowerher_token', data.token);
                localStorage.setItem('empowerher_user', JSON.stringify(data.user));
                showMessage('Account created! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

            } else {
                // --- LOGIN ---
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showMessage(data.error, 'error');
                    return;
                }

                localStorage.setItem('empowerher_token', data.token);
                localStorage.setItem('empowerher_user', JSON.stringify(data.user));
                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            }
        } catch (err) {
            console.error('Auth error:', err);
            showMessage('Network error. Please make sure the server is running.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = originalText;
        }
    }

    // --- Google Sign-In Callback ---
    async function handleGoogleSignIn(response) {
        hideMessage();
        try {
            const res = await fetch(`${API_BASE}/api/auth/google`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            });
            const data = await res.json();

            if (!res.ok) {
                showMessage(data.error, 'error');
                return;
            }

            localStorage.setItem('empowerher_token', data.token);
            localStorage.setItem('empowerher_user', JSON.stringify(data.user));
            showMessage('Google login successful! Redirecting...', 'success');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        } catch (err) {
            console.error('Google auth error:', err);
            showMessage('Google login failed. Please try again.', 'error');
        }
    }
</script>

</body>
</html>
