services:
  - type: web
    name: empowerher-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
    disk:
      name: empowerher-data
      mountPath: /opt/render/project/src
      sizeGB: 1
