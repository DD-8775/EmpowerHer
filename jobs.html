<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Work | EmpowerHer</title>
    <style>
        /* --- REUSING YOUR THEME --- */
        :root {
            --primary: #2A9D8F; 
            --secondary: #E76F51; 
            --accent: #E9C46A; 
            --bg: #FDFCF5; 
            --text: #264653; 
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --success: #28a745;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        /* --- NAV (Consistent) --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 5%; background: var(--white); box-shadow: var(--shadow);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a:hover { color: var(--secondary); }
        .btn-primary {
            background-color: var(--secondary); color: var(--white);
            padding: 0.6rem 1.5rem; border-radius: 50px; font-weight: 600;
        }
        .btn-logout {
            background: none; border: 1px solid #ccc; padding: 0.4rem 1rem;
            border-radius: 50px; cursor: pointer; font-size: 0.85rem; color: #666; transition: 0.3s;
        }
        .btn-logout:hover { border-color: var(--secondary); color: var(--secondary); }

        /* --- FILTERS SECTION --- */
        .search-container {
            background: linear-gradient(135deg, var(--primary) 0%, #218c7e 100%);
            padding: 3rem 5%;
            text-align: center;
            color: var(--white);
        }

        .search-bar {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 12px;
            border-radius: 50px;
            border: none;
            outline: none;
            min-width: 150px;
            cursor: pointer;
        }

        /* --- JOB LISTINGS --- */
        .container { padding: 3rem 5%; }
        
        .section-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .job-card {
            background: var(--white);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border-top: 5px solid var(--accent);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .job-card:hover { transform: translateY(-5px); }

        .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; }
        
        .badge {
            font-size: 0.75rem; padding: 4px 10px; border-radius: 20px;
            font-weight: bold; text-transform: uppercase;
        }
        .badge.cooking { background: #ffe3e3; color: #d63031; }
        .badge.teaching { background: #e3f2fd; color: #0984e3; }
        .badge.craft { background: #fff3cd; color: #856404; }
        .badge.data { background: #e2e6ea; color: #2d3436; }

        .job-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
        .job-pay { color: var(--success); font-weight: 700; font-size: 1.1rem; }
        
        .job-details {
            margin: 1rem 0;
            font-size: 0.9rem;
            color: #666;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .detail-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }

        .btn-apply {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: auto;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
            font-weight: 600;
        }
        .btn-apply:hover { background: #1f7a6f; }
        .btn-apply:disabled { background: #999; cursor: not-allowed; }
        .btn-apply.applied { background: var(--success); cursor: default; }

        /* Toast notification */
        .toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--text);
            color: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 9999; display: none; animation: slideUp 0.3s ease;
        }
        .toast.success { background: var(--success); }
        .toast.error { background: #d63031; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .loading-text { text-align: center; padding: 3rem; color: #999; font-size: 1.1rem; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .section-header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EmpowerHer</div>
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="#" style="color: var(--secondary); font-weight: bold;">Find Work</a>
            <a href="community.html">Community</a>
            <button class="btn-logout" id="logout-btn" onclick="logout()" style="display:none;">Logout</button>
        </div>
        
    </nav>

    <section class="search-container">
        <h1>Find work that fits your schedule</h1>
        <p id="job-total-hero">Loading jobs...</p>
        
        <div class="search-bar">
            <select class="filter-select" id="filter-skill">
                <option>Select Skill</option>
                <option>Cooking</option>
                <option>Teaching</option>
                <option>Stitching</option>
                <option>Art & Craft</option>
                <option>Data Entry</option>
            </select>
            <select class="filter-select" id="filter-time">
                <option>Time Available</option>
                <option>1 Hour</option>
                <option>2-4 Hours</option>
                <option>Full Day</option>
            </select>
            <button class="btn-primary" style="border:none; cursor:pointer;" onclick="loadJobs()">Search Jobs</button>
        </div>
    </section>

    <div class="container">
        <div class="section-header">
            <h2>Recent Opportunities</h2>
            <span id="job-count" style="color: #666;">Loading...</span>
        </div>

        <div class="job-grid" id="job-grid">
            <div class="loading-text">Loading jobs...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script>
    const API_BASE = window.location.origin;
    const token = localStorage.getItem('empowerher_token');

    // Show logout if logged in
    if (token) {
        document.getElementById('logout-btn').style.display = 'inline-block';
    }

    function logout() {
        localStorage.removeItem('empowerher_token');
        localStorage.removeItem('empowerher_user');
        window.location.href = 'index.html';
    }

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast ' + type;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    function getBadgeClass(category) {
        const map = {
            'Cooking': 'cooking',
            'Teaching': 'teaching',
            'Art & Craft': 'craft',
            'Stitching': 'craft',
            'Data Entry': 'data'
        };
        return map[category] || 'data';
    }

    async function loadJobs() {
        const skill = document.getElementById('filter-skill').value;
        const time = document.getElementById('filter-time').value;

        let url = `${API_BASE}/api/jobs?`;
        if (skill !== 'Select Skill') url += `skill=${encodeURIComponent(skill)}&`;
        if (time !== 'Time Available') url += `time=${encodeURIComponent(time)}&`;

        try {
            const res = await fetch(url);
            const data = await res.json();

            document.getElementById('job-count').textContent = `Showing ${data.total} Jobs`;
            document.getElementById('job-total-hero').textContent = `${data.total}+ Verified jobs available today`;

            const grid = document.getElementById('job-grid');

            if (data.jobs.length === 0) {
                grid.innerHTML = '<div class="loading-text">No jobs found matching your filters. Try different criteria.</div>';
                return;
            }

            grid.innerHTML = data.jobs.map(job => `
                <div class="job-card">
                    <div class="card-header">
                        <span class="badge ${getBadgeClass(job.category)}">${job.category}</span>
                        <span style="font-size:1.5rem;">${job.icon}</span>
                    </div>
                    <div class="job-title">${job.title}</div>
                    <div class="job-pay">${job.pay}</div>
                    <p style="font-size: 0.9rem; margin-top: 5px;">${job.description}</p>
                    
                    <div class="job-details">
                        <div class="detail-item">⏱ <strong>Time:</strong> ${job.time}</div>
                        <div class="detail-item">📍 <strong>Location:</strong> ${job.location}</div>
                        <div class="detail-item">📋 <strong>Req:</strong> ${job.requirements}</div>
                    </div>
                    <button class="btn-apply" onclick="applyToJob(${job.id}, this)" id="apply-btn-${job.id}">Apply Now</button>
                </div>
            `).join('');

        } catch (err) {
            console.error('Load jobs error:', err);
            document.getElementById('job-grid').innerHTML = '<div class="loading-text">Error loading jobs. Is the server running?</div>';
        }
    }

    async function applyToJob(jobId, btn) {
        if (!token) {
            showToast('Please login first to apply for jobs.', 'error');
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Applying...';

        try {
            const res = await fetch(`${API_BASE}/api/jobs/${jobId}/apply`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            const data = await res.json();

            if (!res.ok) {
                if (res.status === 409) {
                    btn.textContent = '✓ Already Applied';
                    btn.classList.add('applied');
                    showToast(data.error, 'error');
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Apply Now';
                    showToast(data.error, 'error');
                }
                return;
            }

            btn.textContent = '✓ Applied!';
            btn.classList.add('applied');
            showToast(data.message, 'success');
        } catch (err) {
            console.error('Apply error:', err);
            btn.disabled = false;
            btn.textContent = 'Apply Now';
            showToast('Network error. Please try again.', 'error');
        }
    }

    // Load jobs on page load
    loadJobs();
</script>

</body>
</html>
