<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EmpowerHer</title>
    <style>
        /* --- COPYING YOUR EXISTING THEME --- */
        :root {
            --primary: #2A9D8F; /* Calming Teal */
            --primary-dark: #1f7a6f;
            --secondary: #E76F51; /* Warm Terracotta */
            --accent: #E9C46A; /* Soft Gold */
            --bg: #FDFCF5; /* Cream White */
            --text: #264653; /* Dark Charcoal */
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- LOGIN CONTAINER --- */
        .container {
            background: var(--white);
            width: 100%;
            max-width: 900px;
            min-height: 600px;
            display: flex;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        /* --- LEFT SIDE (IMAGE/BRANDING) --- */
        .brand-section {
            flex: 1;
            background: linear-gradient(135deg, var(--primary) 0%, #218c7e 100%);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem;
            position: relative;
        }

        .brand-section::after {
            /* Decorative Circle */
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .brand-section h1 { font-size: 2.5rem; margin-bottom: 1rem; line-height: 1.2; }
        .brand-section p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem; }
        
        .testimonial {
            background: rgba(255,255,255,0.1);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            font-style: italic;
            margin-top: auto;
        }

        /* --- RIGHT SIDE (FORM) --- */
        .form-section {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-text {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            display: inline-block;
            text-decoration: none;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding-bottom: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: var(--text);
            border-bottom: 3px solid var(--secondary);
        }

        /* --- INPUTS --- */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 600; }
        
        .input-wrapper { position: relative; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        /* --- BUTTONS --- */
        .btn-submit {
            width: 100%;
            background: var(--secondary);
            color: var(--white);
            padding: 12px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: #d65d3f;
            transform: translateY(-2px);
        }

        .google-btn {
            width: 100%;
            background: var(--white);
            border: 2px solid #eee;
            padding: 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            margin-top: 1rem;
            color: #555;
            font-weight: 600;
            transition: 0.3s;
        }
        
        .google-btn:hover { border-color: #ddd; background: #fafafa; }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #999;
            font-size: 0.9rem;
            position: relative;
        }
        
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #eee;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* --- TOGGLE LOGIC --- */
        .signup-field { display: none; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container { flex-direction: column; min-height: auto; }
            .brand-section { padding: 2rem; display: none; /* Hide branding on small mobile to save space */ }
            .form-section { padding: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-section">
        <h1>Start your journey to<br>Financial Freedom.</h1>
        <p>Join 10,000+ housewives earning safely from home.</p>
        
        <div class="testimonial">
            "The platform is so easy to use. I created my profile in 2 minutes!"
            <br><br>
            <small>— Meera K, Joined 2 days ago</small>
        </div>
    </div>

    <div class="form-section">
        <a href="000 EmpowerHer.html" class="logo-text">EmpowerHer</a>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')" id="tab-login">Login</div>
            <div class="tab" onclick="switchTab('signup')" id="tab-signup">Sign Up</div>
        </div>

        <form onsubmit="event.preventDefault(); handleSubmit();">
            
            <div class="form-group signup-field">
                <label>Full Name</label>
                <input type="text" placeholder="e.g. Anita Sharma">
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <div class="input-wrapper">
                    <input type="tel" placeholder="98765 43210" pattern="[0-9]{10}" required>
                </div>
            </div>

            <div class="form-group">
                <label id="pass-label">Password</label>
                <input type="password" placeholder="••••••••" id="pass-input">
                <div style="text-align: right; margin-top: 5px;">
                    <a href="#" style="font-size: 0.8rem; color: var(--primary);">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Login Securely</button>

            <div class="divider">OR</div>

            <button class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="G">
                Continue with Google
            </button>
        </form>
    </div>
</div>

<script>
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const signupFields = document.querySelectorAll('.signup-field');
    const submitBtn = document.getElementById('submit-btn');
    const passLabel = document.getElementById('pass-label');
    const passInput = document.getElementById('pass-input');

    function switchTab(mode) {
        if (mode === 'signup') {
            // UI Changes for Signup
            tabLogin.classList.remove('active');
            tabSignup.classList.add('active');
            
            // Show Name Field
            signupFields.forEach(field => field.style.display = 'block');
            
            // Change Password to 'Create Password'
            passLabel.innerText = "Create Password";
            submitBtn.innerText = "Create Account";
            
        } else {
            // UI Changes for Login
            tabSignup.classList.remove('active');
            tabLogin.classList.add('active');
            
            // Hide Name Field
            signupFields.forEach(field => field.style.display = 'none');
            
            // Reset Label
            passLabel.innerText = "Password";
            submitBtn.innerText = "Login Securely";
        }
    }

    function handleSubmit() {
        // Simple redirect simulation
        const btnText = submitBtn.innerText;
        submitBtn.innerText = "Processing...";
        submitBtn.style.background = "#999";
        
        setTimeout(() => {
            alert("Success! Redirecting to Dashboard...");
            // In a real scenario, this would redirect to dashboard.html
            window.location.href = "000 EmpowerHer.html"; 
            submitBtn.innerText = btnText;
            submitBtn.style.background = "var(--secondary)";
        }, 1500);
    }
</script>

</body>
</html>
